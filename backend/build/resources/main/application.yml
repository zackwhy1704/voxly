spring:
  application:
    name: voxly-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/voxly}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

voxly:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-at-least-256-bits-long-here}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-20250514
    base-url: https://api.anthropic.com/v1
  elevenlabs:
    api-key: ${ELEVENLABS_API_KEY:}
    voice-id: ${ELEVENLABS_VOICE_ID:21m00Tcm4TlvDq8ikWAM}
    base-url: https://api.elevenlabs.io/v1
  whisper:
    api-url: ${WHISPER_API_URL:http://localhost:9000}
    model: large-v3
  cors:
    allowed-origins:
      - http://localhost:3000
      - voxly://app
      - http://10.0.2.2:8080
