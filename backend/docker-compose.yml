version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: voxly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    environment:
      ASR_MODEL: base
    ports:
      - "9000:9000"

  voxly-backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/voxly
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WHISPER_API_URL: http://whisper:9000
      JWT_SECRET: dev-secret-key-minimum-256-bits-long-replace-in-prod
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
    depends_on:
      - postgres
      - redis
      - whisper

volumes:
  postgres_data:
